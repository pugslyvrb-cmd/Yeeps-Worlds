<!DOCTYPE html>
<html>

<head>

<title>Yeeps Worlds</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
margin:0;
}

header{
background:#00ffb3;
color:black;
padding:25px;
text-align:center;
}

.card{
background:#222;
padding:20px;
margin:20px;
border-radius:15px;
}

input, textarea{
width:90%;
padding:10px;
margin:8px;
border-radius:10px;
border:none;
}

button{
padding:10px;
border-radius:10px;
border:none;
cursor:pointer;
}

.upload{
background:#00ffb3;
}

.up{
background:#00ff88;
}

.down{
background:#ff5555;
}

img{
max-width:300px;
border-radius:15px;
}

</style>

</head>


<body>


<header>

<h1>🌎 Yeeps Worlds</h1>

<p>Share your community worlds</p>

</header>



<div class="card">

<h2>➕ Upload World</h2>


<input id="name" placeholder="World Name">


<textarea id="desc" placeholder="Description"></textarea>


<input id="creator" placeholder="Creator">


<input id="image" placeholder="Image URL">


<input id="video" placeholder="Video URL">


<br>

<button class="upload" onclick="uploadWorld()">

Upload World

</button>


</div>




<h2 style="padding:20px">
Community Worlds
</h2>


<div id="worlds">

Loading...

</div>





<script type="module">


import { db } from "./firebase.js";


import {

collection,
addDoc,
onSnapshot,
doc,
updateDoc

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";





window.uploadWorld = async function(){


await addDoc(collection(db,"worlds"),{


name:
document.getElementById("name").value,


description:
document.getElementById("desc").value,


creator:
document.getElementById("creator").value,


image:
document.getElementById("image").value,


video:
document.getElementById("video").value,


upvotes:0,

downvotes:0


});


alert("World Uploaded!");

}





onSnapshot(collection(db,"worlds"),(snap)=>{


let html="";


snap.forEach((doc)=>{


let w=doc.data();


html += `

<div class="card">

<h2>${w.name}</h2>

<p>
👤 ${w.creator}
</p>


<p>
${w.description}
</p>


${w.image ?
`<img src="${w.image}">`
:
""}


<br><br>


<button class="up"
onclick="vote('${doc.id}','up')">

👍 ${w.upvotes}

</button>


<button class="down"
onclick="vote('${doc.id}','down')">

👎 ${w.downvotes}

</button>


</div>


`;


});


document.getElementById("worlds").innerHTML=html;


});





window.vote = async function(id,type){


let ref=doc(db,"worlds",id);


let change={};


if(type=="up"){

change.upvotes=1;

}

else{

change.downvotes=1;

}


await updateDoc(ref,change);


}


</script>



</body>

</html>
